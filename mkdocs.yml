site_name: Tridente Store
site_description: Documentación profesional del sistema de gestión de ventas
site_author: Anyelo Jhans Sarmiento Larico

theme:
  name: material
  language: es
  favicon: assets/favicon.svg

  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: Modo oscuro

    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Modo claro

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_css:
  - assets/extra.css
   
nav:
  - Inicio: index.md

  - Proyecto:
      - Descripción: proyecto/descripcion.md
      - Objetivos: proyecto/objetivos.md
      - Alcance: proyecto/alcance.md
      - Tecnologías: proyecto/tecnologias.md

  - Fases:
      - Fase 1 - Análisis: fases/fase1-analisis.md
      - Fase 2 - Diseño: fases/fase2-diseno.md
      - Fase 3 - Desarrollo: fases/fase3-desarrollo.md
      - Fase 4 - Pruebas: fases/fase4-pruebas.md

  - Arquitectura:
      - Arquitectura General: arquitectura/arquitectura-general.md
      - Modelo C4: arquitectura/c4.md
      - Arquitectura MVC: arquitectura/mvc.md
      - Cliente - Servidor: arquitectura/cliente-servidor.md
      - Base de Datos: arquitectura/base-datos.md
      - Seguridad: arquitectura/seguridad.md
      - DevOps: arquitectura/devops.md
      - Calidad Arquitectónica: arquitectura/calidad.md
      - Comparación Arquitectónica: arquitectura/comparacion.md

  - Auditoría:
    - Introducción: auditoria/index.md
    - Metodología: auditoria/metodologia.md
    - A01 - Gestión del Proyecto: auditoria/alcance-a01-gestion.md
    - A02 - Requerimientos: auditoria/alcance-a02-requerimientos.md
    - A03 - Arquitectura: auditoria/alcance-a03-arquitectura.md
    - A04 - Desarrollo: auditoria/alcance-a04-desarrollo.md
    - A05 - Base de Datos: auditoria/alcance-a05-base-datos.md
    - A06 - Seguridad: auditoria/alcance-a06-seguridad.md
    - A07 - Calidad: auditoria/alcance-a07-calidad.md
    - A08 - API REST: auditoria/alcance-a08-api.md
    - A09 - Documentación: auditoria/alcance-a09-documentacion.md
    - A10 - Manuales: auditoria/alcance-a10-manuales.md
    - A11 - Evidencias: auditoria/alcance-a11-evidencias.md
    - A12 - GitHub: auditoria/alcance-a12-github.md
    - Hallazgos: auditoria/hallazgos.md
    - Riesgos: auditoria/riesgos.md
    - Recomendaciones: auditoria/recomendaciones.md
    - Conclusión: auditoria/conclusion.md

  - Manuales:
      - Manual Técnico: manuales/manual-tecnico.md
      - Manual de Usuario: manuales/manual-usuario.md

  - Evidencias:
      - Capturas: evidencias/capturas.md